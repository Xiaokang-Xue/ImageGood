name: Feature Request
description: 提议可验证的产品或工程改进
title: "[Feature]: "
body:
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前检查
      options:
        - label: 我已搜索现有 Issue 和 ROADMAP，未发现相同建议。
          required: true
        - label: 建议中不包含密钥、个人信息或生产数据。
          required: true
  - type: textarea
    id: problem
    attributes:
      label: 用户问题
      description: 请先说明要解决的问题，而不是只描述一个实现方案。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 说明目标流程、范围和预期结果。
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: 兼容性与边界
      description: 列出不应改变的已有行为、数据兼容要求和可暂缓内容。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 其他方案
      description: 可选。说明考虑过的替代方案或为什么现有能力不足。

