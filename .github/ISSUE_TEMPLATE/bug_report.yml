name: Bug Report
description: 报告可复现的功能错误或回归
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请先删除日志中的密钥、个人信息、订单信息、用户图片和内部地址。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前检查
      options:
        - label: 我已搜索现有 Issue，未发现相同问题。
          required: true
        - label: 我确认内容中不包含密钥、证书、个人信息或生产数据。
          required: true
        - label: 这不是未公开的安全漏洞；安全问题将按 SECURITY.md 私下报告。
          required: true
  - type: dropdown
    id: area
    attributes:
      label: 问题范围
      options:
        - 前端页面与移动端
        - 图片任务与 Provider
        - 登录与账号
        - 积分与支付
        - 历史记录与存储
        - 管理后台与运营
        - 文档、脚本与 CI
        - 其他
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 简要说明发生了什么，以及它对用户造成的影响。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 启动模式为 ...
        2. 访问 ...
        3. 点击 ...
        4. 观察到 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 运行环境
      description: 请提供操作系统、Node.js 版本、浏览器、提交 SHA，以及 mock / real、local / MySQL / COS 等运行模式。不要粘贴环境变量值。
      render: text
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 脱敏日志或截图
      description: 可选。请隐藏密钥、用户数据、订单号、内部地址和图片内容。

